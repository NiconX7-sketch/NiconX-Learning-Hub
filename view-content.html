<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study Notes - NiconX Learning Hub</title>
    <meta name="description" content="Comprehensive revision notes and practice questions for Kenyan CBC curriculum.">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#1A3A5F',
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Content protection */
        body {
            user-select: none;
            -webkit-user-select: none;
        }
        
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 10px;
            color: rgba(0,0,0,0.12);
            pointer-events: none;
            z-index: 9999;
            font-family: monospace;
            background: rgba(255,255,255,0.5);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        @media print {
            body { display: none; }
        }
        
        /* Quiz styling */
        .quiz-option {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .quiz-option:hover {
            background-color: #f3f4f6;
            border-color: #FF6B35;
        }
        
        .quiz-option.selected {
            border-color: #FF6B35;
            background-color: rgba(255, 107, 53, 0.1);
        }
        
        .quiz-option.correct {
            border-color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
        }
        
        .quiz-option.wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body oncontextmenu="return false" class="bg-gray-100">

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/254110049657?text=Hello%20NiconX%20Learning%20Hub%2C%20I%20need%20help%20understanding%20a%20topic" 
       target="_blank" 
       class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition z-50">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="images/logo.png" alt="Logo" class="h-8 w-auto" onerror="this.src='https://placehold.co/200x60/FF6B35/white?text=NiconX'">
                    <h1 class="text-lg font-bold text-secondary" id="topicTitle">Loading...</h1>
                </div>
                <a href="dashboard.html" class="text-primary hover:text-orange-700 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Notes Section -->
        <div id="notesContainer" class="bg-white rounded-xl shadow-md p-6 md:p-8 mb-6">
            <div class="text-center py-8">
                <div class="spinner mx-auto"></div>
                <p class="text-gray-500 mt-4">Loading notes...</p>
            </div>
        </div>

        <!-- Practice Questions Section -->
        <div id="quizContainer" class="bg-white rounded-xl shadow-md p-6 md:p-8">
            <div class="flex items-center mb-6">
                <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center mr-3">
                    <i class="fas fa-puzzle-piece text-primary text-lg"></i>
                </div>
                <h2 class="text-xl font-bold text-secondary">Practice Questions</h2>
            </div>
            <div id="quizContent">
                <div class="text-center py-8 text-gray-500">Loading questions...</div>
            </div>
            <div id="quizResult" class="mt-6"></div>
        </div>
    </div>

    <!-- Watermark -->
    <div class="watermark" id="watermark"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // Get topic ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = urlParams.get('topic');
        const userPhone = localStorage.getItem('userPhone');
        
        // Add watermark with phone number
        if (userPhone) {
            const formattedPhone = userPhone.replace(/^254/, '0');
            document.getElementById('watermark').textContent = `Licensed to: ${formattedPhone} | NiconX Learning Hub`;
        }
        
        let currentQuestions = [];
        let userAnswers = {};
        let score = 0;
        
        // Load content from Supabase
        async function loadContent() {
            const container = document.getElementById('notesContainer');
            const quizDiv = document.getElementById('quizContent');
            
            if (!topicId) {
                container.innerHTML = '<div class="text-center text-red-500 py-8"><i class="fas fa-exclamation-circle text-2xl mb-2"></i><p>No topic selected. Please go back and choose a topic.</p></div>';
                quizDiv.innerHTML = '';
                return;
            }
            
            const result = await getTopicById(topicId);
            
            if (!result.success || !result.data) {
                container.innerHTML = '<div class="text-center text-red-500 py-8"><i class="fas fa-exclamation-circle text-2xl mb-2"></i><p>Topic not found. Please go back and try again.</p></div>';
                quizDiv.innerHTML = '';
                return;
            }
            
            const topic = result.data;
            
            // Update title
            document.getElementById('topicTitle').textContent = topic.topic;
            
            // Render notes
            container.innerHTML = `<div class="prose max-w-none">${topic.notes || '<p class="text-gray-500">No notes available for this topic yet. Check back soon!</p>'}</div>`;
            
            // Render questions
            if (topic.questions && topic.questions.length > 0) {
                currentQuestions = topic.questions;
                renderQuiz(currentQuestions);
            } else {
                quizDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><i class="fas fa-question-circle text-3xl mb-2"></i><p>No practice questions yet. Coming soon!</p></div>';
            }
        }
        
        // Render quiz questions
        function renderQuiz(questions) {
            const quizDiv = document.getElementById('quizContent');
            let html = '<div class="space-y-6">';
            
            questions.forEach((q, index) => {
                if (q.type === 'mcq') {
                    html += `
                        <div class="border border-gray-200 rounded-xl p-5" data-question="${index}">
                            <p class="font-semibold text-gray-800 mb-4">${index + 1}. ${escapeHtml(q.question)}</p>
                            <div class="space-y-2 ml-2" id="options-${index}">
                                ${q.options.map((opt, optIndex) => `
                                    <label class="flex items-center p-3 rounded-xl quiz-option border border-gray-200 cursor-pointer transition" onclick="selectOption(${index}, ${optIndex}, '${escapeHtml(opt).replace(/'/g, "\\'")}')">
                                        <input type="radio" name="q${index}" value="${escapeHtml(opt).replace(/'/g, "\\'")}" class="mr-3 hidden">
                                        <span class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center mr-3 option-indicator">
                                            <span class="w-3 h-3 rounded-full bg-primary hidden"></span>
                                        </span>
                                        <span>${escapeHtml(opt)}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <div id="feedback-${index}" class="text-sm mt-3"></div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="border border-gray-200 rounded-xl p-5">
                            <p class="font-semibold text-gray-800 mb-4">${index + 1}. ${escapeHtml(q.question)}</p>
                            <textarea id="answer-${index}" rows="3" class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:border-primary transition" placeholder="Type your answer here..."></textarea>
                            <button onclick="checkShortAnswer(${index}, '${escapeHtml(q.answer).replace(/'/g, "\\'")}')" class="mt-3 bg-primary text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-orange-700 transition">
                                <i class="fas fa-check mr-1"></i> Check Answer
                            </button>
                            <div id="feedback-${index}" class="text-sm mt-3"></div>
                        </div>
                    `;
                }
            });
            
            html += `<button onclick="submitQuiz()" class="w-full bg-secondary text-white py-3 rounded-xl font-semibold hover:bg-secondary/90 transition mt-4">
                        <i class="fas fa-check-double mr-2"></i> Submit All MCQs
                    </button>`;
            html += `</div>`;
            quizDiv.innerHTML = html;
        }
        
        // Select option for MCQ
        function selectOption(questionIndex, optionIndex, value) {
            // Remove selected class from all options in this question
            const container = document.getElementById(`options-${questionIndex}`);
            const labels = container.querySelectorAll('.quiz-option');
            const indicators = container.querySelectorAll('.option-indicator span');
            
            labels.forEach((label, idx) => {
                label.classList.remove('selected');
                indicators[idx].classList.add('hidden');
            });
            
            // Add selected class to clicked option
            labels[optionIndex].classList.add('selected');
            indicators[optionIndex].classList.remove('hidden');
            
            // Store answer
            userAnswers[questionIndex] = value;
        }
        
        // Check short answer
        function checkShortAnswer(questionIndex, correctAnswer) {
            const userAnswer = document.getElementById(`answer-${questionIndex}`).value.trim().toLowerCase();
            const isCorrect = userAnswer === correctAnswer.toLowerCase();
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            
            if (isCorrect) {
                feedback.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle mr-1"></i> ✓ Correct! Excellent work.</span>';
                feedback.classList.add('text-green-600');
            } else {
                feedback.innerHTML = `<span class="text-red-600"><i class="fas fa-times-circle mr-1"></i> ✗ Not quite. Expected answer: "${escapeHtml(correctAnswer)}"</span>`;
                feedback.classList.add('text-red-600');
            }
        }
        
        // Submit all MCQs
        function submitQuiz() {
            let totalMcq = 0;
            let correctCount = 0;
            
            currentQuestions.forEach((q, index) => {
                if (q.type === 'mcq') {
                    totalMcq++;
                    const selectedAnswer = userAnswers[index];
                    const isCorrect = selectedAnswer === q.answer;
                    
                    if (isCorrect) {
                        correctCount++;
                        const feedback = document.getElementById(`feedback-${index}`);
                        if (feedback) {
                            feedback.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle mr-1"></i> ✓ Correct!</span>';
                        }
                    } else if (selectedAnswer) {
                        const feedback = document.getElementById(`feedback-${index}`);
                        if (feedback) {
                            feedback.innerHTML = `<span class="text-red-600"><i class="fas fa-times-circle mr-1"></i> ✗ Incorrect. Correct answer: ${escapeHtml(q.answer)}</span>`;
                        }
                    }
                }
            });
            
            const resultDiv = document.getElementById('quizResult');
            if (totalMcq > 0) {
                const percentage = Math.round((correctCount / totalMcq) * 100);
                resultDiv.innerHTML = `
                    <div class="bg-primary/10 rounded-xl p-5 text-center">
                        <div class="text-3xl font-bold text-primary mb-2">${correctCount}/${totalMcq}</div>
                        <p class="font-semibold text-gray-700">Your Score</p>
                        <div class="w-full bg-gray-200 rounded-full h-2 mt-3">
                            <div class="bg-primary h-2 rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        ${percentage >= 80 ? '<p class="text-green-600 mt-3"><i class="fas fa-trophy mr-1"></i> Excellent! Keep it up!</p>' : percentage >= 50 ? '<p class="text-yellow-600 mt-3"><i class="fas fa-thumbs-up mr-1"></i> Good effort! Review the notes and try again.</p>' : '<p class="text-gray-600 mt-3"><i class="fas fa-book-open mr-1"></i> Review the notes and try the questions again.</p>'}
                    </div>
                `;
            } else {
                resultDiv.innerHTML = '';
            }
            
            // Scroll to results
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Disable keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
                e.preventDefault();
                showToast('Screenshots and saving are disabled to protect content.', 'error');
                return false;
            }
        });
        
        // Load content on page load
        loadContent();
    </script>
</body>
</html>
