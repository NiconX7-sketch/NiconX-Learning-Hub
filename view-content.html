<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notes - NiconX Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Anti-screenshot basic protection */
        body {
            user-select: none;
            -webkit-user-select: none;
        }
        .watermark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 9999;
        }
        @media print {
            body { display: none; }
        }
    </style>
</head>
<body oncontextmenu="return false" class="bg-gray-100">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <img src="images/logo.png" alt="Logo" class="h-8 mr-2">
                    <h1 class="text-lg font-bold text-secondary" id="topicTitle">Loading...</h1>
                </div>
                <a href="dashboard.html" class="text-primary"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>

        <!-- Notes Section -->
        <div id="notesContainer" class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="text-center py-8">Loading notes...</div>
        </div>

        <!-- Practice Questions Section -->
        <div id="quizContainer" class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-secondary mb-4"><i class="fas fa-puzzle-piece mr-2"></i> Practice Questions</h2>
            <div id="quizContent"></div>
            <div id="quizResult" class="mt-4"></div>
        </div>
    </div>
    <div class="watermark" id="watermark"></div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const className = urlParams.get('class');
        const subject = urlParams.get('subject');
        const topicId = urlParams.get('topic');
        const userPhone = localStorage.getItem('userPhone');
        
        // Add watermark with phone number
        if (userPhone) {
            document.getElementById('watermark').textContent = `Paid for by ${userPhone} | NiconX Learning Hub`;
        }
        
        // Load content
        loadContent();
        
        async function loadContent() {
            const response = await fetch(`/api/get-content.php?class=${className}&subject=${subject}&topic=${topicId}&detailed=true`);
            const data = await response.json();
            
            document.getElementById('topicTitle').textContent = data.topic;
            document.getElementById('notesContainer').innerHTML = `<div class="prose max-w-none">${data.notes}</div>`;
            
            // Render quiz
            renderQuiz(data.questions);
        }
        
        let userAnswers = {};
        
        function renderQuiz(questions) {
            const quizDiv = document.getElementById('quizContent');
            if (!questions || questions.length === 0) {
                quizDiv.innerHTML = '<p class="text-gray-500">No practice questions yet. Coming soon!</p>';
                return;
            }
            
            let html = '';
            questions.forEach((q, index) => {
                if (q.type === 'mcq') {
                    html += `
                        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                            <p class="font-semibold mb-2">${index + 1}. ${q.question}</p>
                            <div class="space-y-2 ml-4">
                                ${q.options.map(opt => `
                                    <label class="flex items-center">
                                        <input type="radio" name="q${index}" value="${opt}" class="mr-2" onchange="saveAnswer(${index}, '${opt}')">
                                        <span>${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <div id="feedback${index}" class="text-sm mt-2"></div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                            <p class="font-semibold mb-2">${index + 1}. ${q.question}</p>
                            <textarea id="answer${index}" rows="3" class="w-full border rounded-lg p-2" placeholder="Type your answer here..."></textarea>
                            <button onclick="checkShortAnswer(${index}, '${q.answer}')" class="mt-2 bg-primary text-white px-4 py-1 rounded-lg text-sm">Check Answer</button>
                            <div id="feedback${index}" class="text-sm mt-2"></div>
                        </div>
                    `;
                }
            });
            
            html += `<button onclick="submitQuiz()" class="bg-secondary text-white px-6 py-2 rounded-lg font-semibold mt-4">Submit All MCQs</button>`;
            quizDiv.innerHTML = html;
        }
        
        function saveAnswer(questionIndex, answer) {
            userAnswers[questionIndex] = answer;
        }
        
        function checkShortAnswer(index, correctAnswer) {
            const userAnswer = document.getElementById(`answer${index}`).value.toLowerCase().trim();
            const isCorrect = userAnswer === correctAnswer.toLowerCase();
            const feedback = document.getElementById(`feedback${index}`);
            if (isCorrect) {
                feedback.innerHTML = '<span class="text-green-600">âś“ Correct! Good job!</span>';
            } else {
                feedback.innerHTML = `<span class="text-red-600">âś— Not quite. Expected: "${correctAnswer}"</span>`;
            }
        }
        
        async function submitQuiz() {
            // This would save progress to Supabase
            let score = 0;
            let total = Object.keys(userAnswers).length;
            
            // In real implementation, you'd compare with correct answers from backend
            alert(`Quiz submitted! You answered ${score}/${total} correctly. Keep practicing!`);
        }
        
        // Disable keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
                e.preventDefault();
                alert('Screenshots and saving are disabled to protect content.');
            }
        });
    </script>
</body>
</html>
