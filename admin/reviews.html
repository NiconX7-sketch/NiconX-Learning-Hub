<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews - NiconX Learning Hub Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f3f4f6;
        }
        .review-card {
            transition: all 0.2s ease;
        }
        .review-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#1A3A5F',
                    }
                }
            }
        }
    </script>
</head>
<body>

    <!-- Header -->
    <header class="bg-secondary text-white shadow-lg sticky top-0 z-40">
        <div class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-star text-2xl text-primary"></i>
                <div>
                    <h1 class="text-xl font-bold">Review Management</h1>
                    <p class="text-xs text-gray-300">Approve and manage user reviews</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="bg-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-700 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
                </a>
                <button onclick="logout()" class="bg-red-500 px-3 py-2 rounded-lg text-sm hover:bg-red-600 transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container mx-auto px-6 py-8 max-w-5xl">
        <!-- Stats Cards -->
        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-500 text-sm">Total Reviews</p>
                        <p class="text-3xl font-bold text-secondary" id="totalReviews">0</p>
                    </div>
                    <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center">
                        <i class="fas fa-comments text-primary text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-500 text-sm">Pending Approval</p>
                        <p class="text-3xl font-bold text-yellow-600" id="pendingReviews">0</p>
                    </div>
                    <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-clock text-yellow-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-5">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-500 text-sm">Average Rating</p>
                        <p class="text-3xl font-bold text-primary" id="avgRating">0.0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-star text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Review Form (Add New Review - Admin can add manually) -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold text-secondary mb-4">
                <i class="fas fa-plus-circle text-primary mr-2"></i> Add Testimonial
            </h2>
            <form id="addReviewForm" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Name *</label>
                        <input type="text" id="reviewName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Rating *</label>
                        <select id="reviewRating" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                            <option value="5">★★★★★ (5/5)</option>
                            <option value="4">★★★★☆ (4/5)</option>
                            <option value="3">★★★☆☆ (3/5)</option>
                            <option value="2">★★☆☆☆ (2/5)</option>
                            <option value="1">★☆☆☆☆ (1/5)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Review Text *</label>
                    <textarea id="reviewComment" rows="3" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" placeholder="What did the learner or parent say?"></textarea>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="reviewApproved" class="mr-2 w-5 h-5 text-primary">
                    <label class="text-gray-700">Approve immediately (show on website)</label>
                </div>
                <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-orange-700 transition">
                    <i class="fas fa-save mr-2"></i> Add Review
                </button>
            </form>
            <div id="formMessage" class="mt-3 hidden"></div>
        </div>

        <!-- Reviews List -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-secondary mb-4">
                <i class="fas fa-list text-primary mr-2"></i> All Reviews
            </h2>
            <div id="reviewsList" class="space-y-3">
                <div class="text-center text-gray-500 py-8">Loading reviews...</div>
            </div>
        </div>
    </div>

    <script>
        // Check admin auth
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminUsername');
            window.location.href = 'login.html';
        }

        // Load all reviews
        function loadReviews() {
            const reviews = JSON.parse(localStorage.getItem('niconx_reviews') || '[]');
            const container = document.getElementById('reviewsList');
            
            // Update stats
            const total = reviews.length;
            const pending = reviews.filter(r => !r.approved).length;
            const avgRating = reviews.length > 0 
                ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1) 
                : 0;
            
            document.getElementById('totalReviews').textContent = total;
            document.getElementById('pendingReviews').textContent = pending;
            document.getElementById('avgRating').textContent = avgRating;
            
            if (reviews.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-comment-dots text-4xl mb-2"></i><p>No reviews yet. Add your first testimonial above!</p></div>';
                return;
            }
            
            container.innerHTML = reviews.map(review => `
                <div class="review-card border rounded-xl p-5 bg-white shadow-sm">
                    <div class="flex justify-between items-start flex-wrap gap-3">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2 flex-wrap">
                                <div class="flex text-primary">
                                    ${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}
                                </div>
                                ${review.approved 
                                    ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full"><i class="fas fa-check-circle"></i> Approved</span>'
                                    : '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full"><i class="fas fa-clock"></i> Pending</span>'
                                }
                            </div>
                            <p class="text-gray-700 italic">"${escapeHtml(review.comment)}"</p>
                            <p class="text-sm font-semibold text-secondary mt-3">— ${escapeHtml(review.name)}</p>
                            <p class="text-xs text-gray-400 mt-1">Submitted: ${new Date(review.date).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            ${!review.approved ? `
                                <button onclick="approveReview('${review.id}')" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-600 transition">
                                    <i class="fas fa-check mr-1"></i> Approve
                                </button>
                            ` : ''}
                            <button onclick="deleteReview('${review.id}')" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600 transition">
                                <i class="fas fa-trash mr-1"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Add new review
        document.getElementById('addReviewForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('reviewName').value.trim();
            const rating = parseInt(document.getElementById('reviewRating').value);
            const comment = document.getElementById('reviewComment').value.trim();
            const approved = document.getElementById('reviewApproved').checked;
            
            if (!name || !comment) {
                showFormMessage('Please fill in all fields', 'error');
                return;
            }
            
            const reviews = JSON.parse(localStorage.getItem('niconx_reviews') || '[]');
            const newReview = {
                id: Date.now().toString(),
                name: name,
                rating: rating,
                comment: comment,
                approved: approved,
                date: new Date().toISOString()
            };
            
            reviews.unshift(newReview);
            localStorage.setItem('niconx_reviews', JSON.stringify(reviews));
            
            showFormMessage('Review added successfully!', 'success');
            document.getElementById('addReviewForm').reset();
            document.getElementById('reviewApproved').checked = false;
            loadReviews();
            
            setTimeout(() => {
                document.getElementById('formMessage').classList.add('hidden');
            }, 3000);
        });

        function approveReview(id) {
            let reviews = JSON.parse(localStorage.getItem('niconx_reviews') || '[]');
            reviews = reviews.map(r => r.id === id ? { ...r, approved: true } : r);
            localStorage.setItem('niconx_reviews', JSON.stringify(reviews));
            loadReviews();
            showToast('Review approved and will appear on website', 'success');
        }

        function deleteReview(id) {
            if (confirm('Are you sure you want to delete this review permanently?')) {
                let reviews = JSON.parse(localStorage.getItem('niconx_reviews') || '[]');
                reviews = reviews.filter(r => r.id !== id);
                localStorage.setItem('niconx_reviews', JSON.stringify(reviews));
                loadReviews();
                showToast('Review deleted', 'info');
            }
        }

        function showFormMessage(message, type) {
            const msgDiv = document.getElementById('formMessage');
            msgDiv.className = `mt-3 p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            msgDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i> ${message}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-4 py-3 rounded-lg text-white z-50 shadow-lg ${
                type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        checkAuth();
        loadReviews();
    </script>
</body>
</html>
