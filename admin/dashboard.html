<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - NiconX Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#1A3A5F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6 flex justify-between items-center">
            <div class="flex items-center">
                <img src="images/logo.png" alt="Logo" class="h-10 mr-3">
                <div>
                    <h1 class="text-xl font-bold text-secondary">NiconX Learning Hub</h1>
                    <p class="text-xs text-gray-500" id="timerDisplay">Checking access...</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-semibold" id="classDisplay"></p>
                <button onclick="logout()" class="text-red-500 text-xs"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Subjects Grid -->
        <div class="grid md:grid-cols-2 gap-6" id="subjectsContainer">
            <!-- Subjects loaded dynamically -->
        </div>

        <!-- Free Trial Note -->
        <div id="freeTrialNote" class="mt-6 bg-blue-100 border border-blue-300 rounded-lg p-3 text-center text-blue-800 hidden">
            <i class="fas fa-gift mr-2"></i> You're on free trial. First 2 topics only. <a href="payment.html" class="underline font-semibold">Pay 20 KES for full access</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/content.js"></script>
    <script>
        // Check access on page load
        checkAccessAndLoadDashboard();
        
        // Timer display
        const expiresAt = localStorage.getItem('sessionExpires');
        if (expiresAt) {
            updateTimer(expiresAt);
            setInterval(() => updateTimer(expiresAt), 1000);
        }
        
        function updateTimer(expiry) {
            const now = new Date().getTime();
            const expiryTime = new Date(expiry).getTime();
            const timeLeft = expiryTime - now;
            
            if (timeLeft <= 0) {
                document.getElementById('timerDisplay').innerHTML = '<span class="text-red-500">Access expired. <a href="payment.html" class="underline">Pay again</a></span>';
            } else {
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (3600000)) / 60000);
                document.getElementById('timerDisplay').innerHTML = `<i class="fas fa-clock"></i> Access expires in: ${hours}h ${minutes}m`;
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
