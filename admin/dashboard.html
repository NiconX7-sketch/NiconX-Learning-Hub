<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - NiconX Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#1A3A5F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6 flex justify-between items-center flex-wrap gap-3">
            <div class="flex items-center">
                <img src="images/logo.png" alt="Logo" class="h-10 mr-3">
                <div>
                    <h1 class="text-xl font-bold text-secondary">NiconX Learning Hub</h1>
                    <p class="text-xs text-gray-500" id="timerDisplay">Checking access...</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-semibold" id="classDisplay"></p>
                <button onclick="logout()" class="text-red-500 text-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Subjects Grid -->
        <div class="grid md:grid-cols-2 gap-6" id="subjectsContainer">
            <div class="text-center py-8 col-span-2">Loading your topics...</div>
        </div>
    </div>

    <script>
        const selectedClass = localStorage.getItem('selectedClass');
        const userPhone = localStorage.getItem('userPhone');
        const isFreeTrial = new URLSearchParams(window.location.search).get('free') === 'true';
        
        document.getElementById('classDisplay').innerHTML = (selectedClass || 'Grade').toUpperCase().replace('GRADE', 'Grade ');
        
        // Check access before loading content
        async function verifyAndLoad() {
            if (!isFreeTrial && userPhone) {
                const access = await checkUserAccess(userPhone, selectedClass);
                if (!access.has_access) {
                    alert('Your access has expired. Please pay 20 KES to continue.');
                    window.location.href = 'payment.html';
                    return;
                }
                if (access.expires_at) {
                    localStorage.setItem('sessionExpires', access.expires_at);
                    startTimer(access.expires_at);
                }
            }
            
            // Load content from Supabase
            await loadContent();
        }
        
        async function loadContent() {
            const { data: content, error } = await supabaseClient
                .from('content')
                .select('*')
                .eq('class_level', selectedClass)
                .order('subject')
                .order('topic_order');
            
            if (error) {
                document.getElementById('subjectsContainer').innerHTML = '<div class="text-center text-red-500 col-span-2">Error loading content</div>';
                return;
            }
            
            // Group by subject
            const subjects = {};
            content.forEach(item => {
                if (!subjects[item.subject]) subjects[item.subject] = [];
                subjects[item.subject].push({
                    id: item.id,
                    title: item.topic,
                    isLocked: !isFreeTrial && !item.is_free,
                    notes: item.notes,
                    questions: item.questions
                });
            });
            
            if (Object.keys(subjects).length === 0) {
                document.getElementById('subjectsContainer').innerHTML = '<div class="text-center text-gray-500 col-span-2">No content available yet. Check back soon!</div>';
                return;
            }
            
            renderSubjects(subjects);
        }
        
        function renderSubjects(subjects) {
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';
            
            for (const [subjectName, topics] of Object.entries(subjects)) {
                const subjectCard = document.createElement('div');
                subjectCard.className = 'bg-white rounded-xl shadow-md overflow-hidden';
                subjectCard.innerHTML = `
                    <div class="bg-secondary text-white p-4">
                        <h2 class="text-xl font-bold"><i class="fas ${getSubjectIcon(subjectName)} mr-2"></i> ${subjectName}</h2>
                    </div>
                    <div class="p-4">
                        <div class="space-y-2">
                            ${topics.map(topic => `
                                <div class="border rounded-lg p-3 hover:bg-gray-50">
                                    <div class="flex justify-between items-center">
                                        <div>
                                            <h3 class="font-semibold">${escapeHtml(topic.title)}</h3>
                                            ${topic.isLocked ? '<span class="text-xs text-primary"><i class="fas fa-lock"></i> Premium</span>' : '<span class="text-xs text-green-500"><i class="fas fa-unlock-alt"></i> Free</span>'}
                                        </div>
                                        <button onclick="openTopic('${topic.id}', ${topic.isLocked})" 
                                                class="bg-primary text-white px-4 py-1 rounded-lg text-sm">
                                            ${topic.isLocked ? 'Unlock (20 KES)' : 'Study'}
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(subjectCard);
            }
        }
        
        function getSubjectIcon(subject) {
            const icons = {
                'Mathematics': 'fa-calculator',
                'English': 'fa-book',
                'Science': 'fa-flask',
                'Social Studies': 'fa-globe'
            };
            return icons[subject] || 'fa-graduation-cap';
        }
        
        function openTopic(topicId, isLocked) {
            if (isLocked && !isFreeTrial) {
                if (confirm('This is a premium topic. Pay 20 KES to unlock all topics for 8 hours?')) {
                    window.location.href = 'payment.html';
                }
                return;
            }
            window.location.href = `view-content.html?topic=${topicId}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startTimer(expiresAt) {
            const updateTimer = () => {
                const now = new Date().getTime();
                const expiry = new Date(expiresAt).getTime();
                const timeLeft = expiry - now;
                
                if (timeLeft <= 0) {
                    document.getElementById('timerDisplay').innerHTML = '<span class="text-red-500">Access expired. <a href="payment.html" class="underline">Pay again</a></span>';
                } else {
                    const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (3600000)) / 60000);
                    document.getElementById('timerDisplay').innerHTML = `<i class="fas fa-clock"></i> Access expires in: ${hours}h ${minutes}m`;
                }
            };
            updateTimer();
            setInterval(updateTimer, 60000);
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Start
        verifyAndLoad();
    </script>
</body>
</html>
