<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NiconX Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1A3A5F 0%, #FF6B35 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-primary text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-secondary">Admin Login</h1>
            <p class="text-gray-500 text-sm mt-1">NiconX Learning Hub Content Management</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-user text-primary mr-2"></i> Username
                </label>
                <input type="text" id="username" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
                       placeholder="Enter username" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-key text-primary mr-2"></i> Password
                </label>
                <input type="password" id="password" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
                       placeholder="Enter password" required>
            </div>
            
            <button type="submit" 
                    class="w-full bg-primary text-white py-3 rounded-xl font-bold text-lg hover:bg-orange-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-center text-sm hidden"></div>
        
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-gray-400 text-sm hover:text-primary transition">
                <i class="fas fa-arrow-left mr-1"></i> Back to Website
            </a>
        </div>
        
        <div class="mt-4 pt-4 border-t text-center">
            <p class="text-xs text-gray-400">
                <i class="fas fa-lock mr-1"></i> Secure Admin Access Only
            </p>
        </div>
    </div>

    <script>
        // Admin credentials - CHANGE THESE AFTER FIRST LOGIN
        const ADMIN_USERNAME = 'niconx_admin';
        const ADMIN_PASSWORD = 'NiconX@2026Admin';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUsername', username);
                errorDiv.className = 'mt-4 text-green-500 text-center text-sm';
                errorDiv.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Login successful! Redirecting...';
                errorDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> Invalid username or password';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
