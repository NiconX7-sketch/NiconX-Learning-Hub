<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NiconX Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1A3A5F 0%, #FF6B35 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-lock text-primary text-5xl mb-3"></i>
            <h1 class="text-2xl font-bold text-secondary">Admin Login</h1>
            <p class="text-gray-500 text-sm">NiconX Learning Hub Content Management</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-user mr-2"></i> Username
                </label>
                <input type="text" id="username" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-key mr-2"></i> Password
                </label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" required>
            </div>
            <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-orange-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-center text-sm hidden"></div>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <i class="fas fa-shield-alt"></i> Secure Access Only
        </div>
    </div>

    <script>
        // Admin credentials (YOU MUST CHANGE THESE)
        // Username: niconx_admin
        // Password: NiconX@2026Admin
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Change these to your desired credentials
            const validUsername = 'niconx_admin';
            const validPassword = 'NiconX@2026Admin';
            
            if (username === validUsername && password === validPassword) {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').textContent = 'Invalid username or password';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
