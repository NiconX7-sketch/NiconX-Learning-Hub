<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pay 20 KES - NiconX Learning Hub</title>
    
    <!-- Favicon - prevents 404 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#1A3A5F',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #1A3A5F 0%, #FF6B35 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/254110049657?text=Payment%20Help" 
       target="_blank" 
       class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition z-50">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- Logo - Using icon instead of image to avoid 404 -->
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-graduation-cap text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">NiconX Learning Hub</h1>
            <p class="text-white/80" id="selectedClassDisplay"></p>
        </div>

        <!-- Payment Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8">
            <div class="bg-primary/10 rounded-xl p-4 mb-6 text-center">
                <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-clock text-primary text-2xl"></i>
                </div>
                <p class="font-bold text-secondary text-lg">8 Hours Access</p>
                <p class="text-sm text-gray-600">Unlimited notes + practice questions</p>
            </div>

            <div class="text-center mb-6">
                <span class="text-4xl font-bold text-primary">20 KES</span>
                <span class="text-gray-500">/ session</span>
            </div>

            <form id="paymentForm">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-phone-alt text-primary mr-2"></i> M-Pesa Phone Number
                    </label>
                    <input type="tel" id="phone" placeholder="0712345678" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
                           required>
                    <p class="text-xs text-gray-500 mt-1">Enter Safaricom number registered on M-Pesa</p>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-envelope text-primary mr-2"></i> Email (Optional)
                    </label>
                    <input type="email" id="email" placeholder="your@email.com" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition">
                </div>

                <button type="submit" id="payBtn" 
                        class="w-full bg-primary text-white py-3 rounded-xl font-bold text-lg hover:bg-orange-700 transition shadow-lg">
                    <i class="fas fa-money-bill-wave mr-2"></i> Pay 20 KES via M-Pesa
                </button>
            </form>

            <div id="paymentStatus" class="mt-4 hidden"></div>

            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                <p class="text-sm font-semibold text-gray-700 mb-2"><i class="fas fa-info-circle text-primary mr-2"></i> How it works:</p>
                <ul class="text-xs text-gray-600 space-y-1">
                    <li>1. Enter your M-Pesa phone number</li>
                    <li>2. Click "Pay 20 KES"</li>
                    <li>3. Enter PIN on your phone</li>
                    <li>4. Instant 8-hour access</li>
                </ul>
            </div>

            <div class="mt-6 text-center">
                <a href="select-class.html" class="text-primary text-sm hover:underline">
                    <i class="fas fa-arrow-left mr-1"></i> Change Class
                </a>
            </div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="js/supabase-client.js"></script>
    
    <!-- Payment JS (self-contained with all functions) -->
    <script src="js/payment.js"></script>
    
    <script>
        // Display selected class
        const selectedClass = localStorage.getItem('selectedClass');
        const classDisplay = document.getElementById('selectedClassDisplay');
        if (selectedClass && selectedClass !== 'null') {
            classDisplay.textContent = selectedClass.toUpperCase().replace('GRADE', 'Grade ');
        } else {
            window.location.href = 'select-class.html';
        }
    </script>
</body>
</html>
