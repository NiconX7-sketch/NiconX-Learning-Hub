<!-- Replace the payment status polling section with this more robust version -->
<script>
// Better payment confirmation polling
let pollInterval;
let pollAttempts = 0;
const MAX_POLL_ATTEMPTS = 45; // 90 seconds max

async function pollPaymentStatus(phone, classLevel, checkoutId) {
    pollInterval = setInterval(async () => {
        pollAttempts++;
        
        // Check Supabase for payment record
        const { data, error } = await supabaseClient
            .from('payment_sessions')
            .select('*')
            .eq('phone', phone)
            .eq('class_level', classLevel)
            .order('paid_at', { ascending: false })
            .limit(1);
        
        if (data && data.length > 0 && data[0].status === 'active') {
            // Payment confirmed!
            clearInterval(pollInterval);
            localStorage.setItem('sessionExpires', data[0].expires_at);
            showPaymentStatus('✅ Payment successful! Redirecting to dashboard...', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        } else if (pollAttempts >= MAX_POLL_ATTEMPTS) {
            clearInterval(pollInterval);
            showPaymentStatus('⏳ Payment pending. If you completed payment, your access will activate within 5 minutes. Refresh the page or contact support.', 'info');
            document.getElementById('payBtn').disabled = false;
            document.getElementById('payBtn').innerHTML = '<i class="fas fa-money-bill-wave mr-2"></i> Pay 20 KES via M-Pesa';
        }
    }, 2000);
}
</script>
